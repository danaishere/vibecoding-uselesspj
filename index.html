<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Cocktail Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Quiz Header -->
        <div class="quiz-header">
            <h1>🍹 What's Your Personality Cocktail? 🍹</h1>
            <p>Answer 5 quick questions to discover your perfect drink!</p>
        </div>

        <!-- Quiz Content -->
        <div class="quiz-content">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text"><span id="currentQuestion">1</span> / 5</p>
            </div>

            <!-- Question Container -->
            <div id="quizContainer" class="quiz-container">
                <!-- Questions will be populated here by JavaScript -->
            </div>

            <!-- Result Container (hidden initially) -->
            <div id="resultContainer" class="result-container hidden">
                <div class="result-content">
                    <h2>Your Personality Cocktail:</h2>
                    <div class="drink-result">
                        <h3 id="drinkName"></h3>
                        <p class="emoji" id="drinkEmoji"></p>
                        <p id="drinkDescription"></p>
                        <p class="personality-text" id="personalityText"></p>
                    </div>
                    <button id="restartBtn" class="btn btn-primary">Take Quiz Again</button>
                </div>
            </div>

            <!-- Button Container -->
            <div id="buttonContainer" class="button-container">
                <button id="prevBtn" class="btn btn-secondary" style="display:none;">← Previous</button>
                <button id="nextBtn" class="btn btn-primary">Next →</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
